                        "surface": "#131313",

    <style>
        @font-face {
            font-family: 'CascadiaCode';
            src: url('CascadiaCode-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body { font-family: 'Inter', sans-serif; background-color: #131313; color: #E5E2E1; }
        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }
        .font-cascadia { font-family: 'CascadiaCode', 'Cascadia Code', monospace !important; }
    </style>

</head>
<body class="dark overflow-hidden h-screen flex flex-col">

<div id="topbar-container" class="relative z-50"></div>
<div id="dashboard-container" class="flex-1 overflow-hidden z-49"></div>
<div id="environments-container" class="flex-1 overflow-hidden z-49" style="display:none;"></div>

<script>
    const SVG_ICONS = {
        "search":              "M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z",
        "open_in_new":         "M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z",
        "terminal":            "M20 4H4c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.89-2-2-2zm0 14H4V8h16v10zm-2-1h-6v-2h6v2zM7.5 17l-1.41-1.41L8.67 13l-2.58-2.59L7.5 9l4 4-4 4z",
        "assignment":          "M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z",
        "account_tree":        "M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z",
        "play_arrow":          "M8 5v14l11-7z",
        "keyboard_arrow_up":   "M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z",
        "bug_report":          "M20 8h-2.81c-.45-.78-1.07-1.45-1.82-1.96L17 4.41 15.59 3l-2.17 2.17C12.96 5.06 12.49 5 12 5c-.49 0-.96.06-1.41.17L8.41 3 7 4.41l1.62 1.63C7.88 6.55 7.26 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2v1c0 .34.04.67.09 1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20V8zm-6 8h-4v-2h4v2zm0-4h-4v-2h4v2z",
        "notifications":       "M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z",
        "help_outline":        "M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"
    };

    function applyIcons(root) {
        root.querySelectorAll(".material-symbols-outlined").forEach(span => {
            const name = span.textContent.trim();
            if (SVG_ICONS[name]) {
                span.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="1.2em" height="1.2em" style="display:inline-block;vertical-align:middle;"><path d="${SVG_ICONS[name]}"/></svg>`;
                span.style.fontFamily = "inherit";
                span.style.lineHeight = "0";
            }
        });
    }

    window.showPage = function(page) {
        var dash = document.getElementById('dashboard-container');
        var env  = document.getElementById('environments-container');
        if (dash) dash.style.display = (page === 'dashboard') ? '' : 'none';
        if (env)  env.style.display  = (page === 'environments') ? '' : 'none';

        if (page === 'environments' && typeof loadEnvironments === 'function') {
            // requestAnimationFrame ensures the container's display:block has been
            // painted before we trigger any potentially-blocking Java bridge calls.
            requestAnimationFrame(function() { loadEnvironments(); });
        }
    };

    async function loadComponent(containerId, file) {
        const res = await fetch(file);
        const html = await res.text();
        const container = document.getElementById(containerId);
        container.innerHTML = html;
        applyIcons(container);

        container.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');
            newScript.textContent = oldScript.textContent;
            document.body.appendChild(newScript);
        });
    }

    window.addEventListener("load", async () => {
        await loadComponent("topbar-container", "top_bar.html");
        await loadComponent("dashboard-container", "dashboard.html");
        await loadComponent("environments-container", "environments.html");

        // Java bridge bağlantıları
        document.getElementById("btn-import-config")?.addEventListener("click", () => {
            if (window.app) window.app.saveConfig("{'lang':'C', 'timeout':5}");
            else console.log("Java Bridge bulunamadı: Import Config simüle edildi.");
        });

        document.getElementById("btn-run-pipeline")?.addEventListener("click", () => {
            if (window.app) window.app.runPipeline();
            else console.log("Java Bridge bulunamadı: Run Pipeline simüle edildi.");
        });
    });
</script>

</body>
</html>
