<div class="flex flex-col h-full overflow-hidden" style="font-family:'Inter',sans-serif;">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 shrink-0">
        <div>
            <h1 class="text-base font-bold text-on-surface tracking-tight">Environments</h1>
            <p class="text-xs text-outline mt-0.5">Installed languages and applications</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="env-total-count" class="text-xs text-outline"></span>
            <button onclick="loadEnvironments(true)"
                    class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg bg-surface-container-high text-outline hover:text-on-surface hover:bg-surface-container-highest transition-colors">
                <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13">
                    <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Filter + Search -->
    <div class="flex items-center gap-3 px-6 py-3 border-b border-white/5 shrink-0">

        <!-- Filter tabs -->
        <div class="flex items-center gap-1 bg-surface-container-high rounded-lg p-0.5">
            <button id="env-filter-all"  onclick="envSetFilter('all')"   class="env-filter-btn env-filter-active">All</button>
            <button id="env-filter-lang" onclick="envSetFilter('lang')"  class="env-filter-btn">Languages</button>
            <button id="env-filter-apps" onclick="envSetFilter('apps')"  class="env-filter-btn">Applications</button>
        </div>

        <!-- Search -->
        <div class="relative flex-1 max-w-xs">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"
                 viewBox="0 0 24 24" fill="#86948a" width="13" height="13">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="env-search" placeholder="Search…"
                   oninput="envOnSearch(this.value)"
                   style="background:#1b1b1c;border:1px solid rgba(60,74,66,0.5);color:#e5e2e1;font-family:'Inter',sans-serif;"
                   class="w-full pl-8 pr-3 py-1.5 rounded-lg text-sm focus:outline-none focus:border-primary/50">
        </div>
    </div>

    <!-- Loading -->
    <div id="env-loading" class="flex-1 flex flex-col items-center justify-center gap-3">
        <div class="env-spinner"></div>
        <p class="text-sm text-outline">Scanning…</p>
    </div>

    <!-- Content -->
    <div id="env-content" class="flex-1 overflow-y-auto px-6 py-5 env-scroll" style="display:none;">

        <!-- Languages section -->
        <div id="env-lang-section" class="mb-6">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-semibold text-outline uppercase tracking-widest">Language Environments</span>
                <span id="env-lang-count" class="text-xs text-outline/60"></span>
            </div>
            <div id="env-lang-grid" class="env-card-grid"></div>
            <div id="env-lang-empty" class="hidden py-4 text-xs text-outline">No matching language environments found.</div>
        </div>

        <!-- Apps section -->
        <div id="env-apps-section">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-semibold text-outline uppercase tracking-widest">Applications</span>
                <span id="env-apps-count" class="text-xs text-outline/60"></span>
            </div>
            <div id="env-apps-grid" class="env-card-grid"></div>
            <div id="env-apps-empty" class="hidden py-4 text-xs text-outline">No matching applications found.</div>
        </div>

    </div>
</div>

<!-- ── Styles ──────────────────────────────────────────────────────────── -->
<style>
    .env-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, 130px);
        gap: 10px;
        align-content: start;
    }

    /* shared card */
    .env-card {
        width: 130px;
        height: 130px;
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 10px 8px 11px;
        cursor: default;
        box-sizing: border-box;
        overflow: hidden;
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .env-app-card {
        background: #202020;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .env-app-card:hover {
        border-color: rgba(78,222,163,0.22);
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(78,222,163,0.07);
    }
    .env-lang-card {
        background: #1b1b1c;
        border: 1px solid rgba(255,255,255,0.07);
    }
    .env-lang-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.25);
    }

    /* app icon */
    .env-app-icon {
        width: 64px; height: 64px;
        object-fit: contain;
        border-radius: 13px;
        flex-shrink: 0;
    }
    .env-app-icon-ph {
        width: 64px; height: 64px;
        background: rgba(78,222,163,0.07);
        border: 1px solid rgba(78,222,163,0.14);
        border-radius: 13px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }

    /* language badge */
    .env-lang-badge {
        width: 64px; height: 64px;
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        font-size: 17px; font-weight: 800; letter-spacing: -0.5px;
        flex-shrink: 0;
    }

    /* card text */
    .env-card-name {
        font-size: 11px; font-weight: 500;
        color: #bbcabf;
        text-align: center;
        width: 114px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .env-card-ver {
        font-size: 10px; font-weight: 400;
        color: #6b7d72;
        text-align: center;
        width: 114px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        margin-top: -4px;
    }

    /* filter buttons */
    .env-filter-btn {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px; font-weight: 600;
        color: #86948a;
        background: transparent;
        border: none; cursor: pointer;
        transition: background 0.12s, color 0.12s;
    }
    .env-filter-btn:hover  { color: #e5e2e1; background: rgba(255,255,255,0.04); }
    .env-filter-active     { color: #4edea3 !important; background: rgba(78,222,163,0.12) !important; }

    /* spinner */
    .env-spinner {
        width: 28px; height: 28px;
        border: 2.5px solid rgba(78,222,163,0.15);
        border-top-color: #4edea3;
        border-radius: 50%;
        animation: envSpin 0.7s linear infinite;
    }
    @keyframes envSpin { to { transform: rotate(360deg); } }

    .env-scroll::-webkit-scrollbar {
        padding: 4px;
        width: 12px;
        height: 12px;
    }

    .env-scroll::-webkit-scrollbar-track {
        padding: 10px;
        background: transparent;
    }
    .env-scroll::-webkit-scrollbar-thumb {
        padding: 4px;
        background: rgba(78, 222, 163, 0.1);
        border-radius: 999px;
    }

    .env-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(16,185,129,0.45);
    }
    .env-scroll::-webkit-scrollbar-corner{
        background: transparent;
    }
</style>

<!-- ── Script ─────────────────────────────────────────────────────────── -->
<script>
    var envAllApps   = [];
    var envAllLangs  = [];
    var envFilter    = 'all';
    var envQuery     = '';
    var _envCacheReady = false;   // true after first successful load
    var _envLoading    = false;   // guard against concurrent loads

    var ENV_LANG_STYLE = {
        gcc:    { bg: '#1e3a5f', fg: '#5b9bd5', label: 'GCC'  },
        clang:  { bg: '#1e3a5f', fg: '#5b9bd5', label: 'CLG'  },
        python: { bg: '#1a3052', fg: '#4b8bbe', label: 'PY'   },
        java:   { bg: '#3b1a0a', fg: '#ea5421', label: 'JV'   },
        nodejs: { bg: '#0f2d16', fg: '#43a047', label: 'JS'   },
        go:     { bg: '#003040', fg: '#00ADD8', label: 'GO'   },
        rust:   { bg: '#2d1200', fg: '#ce4f00', label: 'RS'   },
        ruby:   { bg: '#2d0707', fg: '#cc342d', label: 'RB'   },
        php:    { bg: '#1e1b38', fg: '#8892be', label: 'PHP'  },
        swift:  { bg: '#2d1000', fg: '#F05138', label: 'SW'   },
        kotlin: { bg: '#1e0f40', fg: '#7F52FF', label: 'KT'   },
        mvn:    { bg: '#2d0810', fg: '#C71A36', label: 'MVN'  }
    };

    // Called on every tab switch — instant if cache is warm, deferred fetch otherwise.
    window.loadEnvironments = function (forceRefresh) {
        if (_envCacheReady && !forceRefresh) {
            // Cache hit: just re-render immediately, no Java call needed
            envRender();
            return;
        }
        if (_envLoading) return;   // already in flight

        // Show loading state right away so the UI doesn't look frozen
        _envLoading = true;
        document.getElementById('env-loading').style.display = 'flex';
        document.getElementById('env-content').style.display = 'none';
        if (forceRefresh) {
            document.getElementById('env-search').value = '';
            envQuery = '';
        }

        // Defer the blocking Java calls so the page-switch CSS transition
        // can paint its first frame before we block the thread.
        setTimeout(function () {
            // ── Step 1: languages (fast — parallel subprocess detection) ──
            try {
                var langsJson = (window.app && window.app.getInstalledLanguages)
                    ? window.app.getInstalledLanguages() : '[]';
                envAllLangs = JSON.parse(langsJson);
            } catch (e) { envAllLangs = []; }

            // Render languages immediately so there's something to see
            _renderLangsPartial();

            // ── Step 2: apps (slower — filesystem scan) in next tick ──
            setTimeout(function () {
                try {
                    var appsJson = (window.app && window.app.getInstalledApps)
                        ? window.app.getInstalledApps() : '[]';
                    envAllApps = JSON.parse(appsJson);
                } catch (e) { envAllApps = []; }

                _envCacheReady = true;
                _envLoading    = false;
                envRender();
            }, 0);
        }, 80);   // 80 ms — enough for the showPage display:block repaint
    };

    // Partial render: show languages + spinner-still-visible for apps
    function _renderLangsPartial() {
        var q         = envQuery;
        var showLang  = envFilter === 'all' || envFilter === 'lang';
        var showApps  = envFilter === 'all' || envFilter === 'apps';
        var langSec   = document.getElementById('env-lang-section');
        var appsSec   = document.getElementById('env-apps-section');

        if (!showLang && !showApps) return;

        // Reveal content area but keep loading indicator for apps section
        document.getElementById('env-loading').style.display = 'none';
        document.getElementById('env-content').style.display = '';

        langSec.style.display = showLang ? '' : 'none';
        appsSec.style.display = 'none';   // apps not ready yet

        if (showLang) {
            var langs = envAllLangs.filter(function(l) {
                return !q || l.name.toLowerCase().indexOf(q) !== -1;
            });
            document.getElementById('env-lang-count').textContent = '(' + langs.length + ')';
            var langGrid  = document.getElementById('env-lang-grid');
            var langEmpty = document.getElementById('env-lang-empty');
            if (langs.length === 0) {
                langGrid.innerHTML = '';
                langEmpty.classList.remove('hidden');
            } else {
                langEmpty.classList.add('hidden');
                langGrid.innerHTML = langs.map(envLangCard).join('');
            }
        }
    }

    function envSetFilter(f) {
        envFilter = f;
        ['all','lang','apps'].forEach(function(id) {
            var btn = document.getElementById('env-filter-' + id);
            if (btn) btn.classList.toggle('env-filter-active', id === f);
        });
        envRender();
    }

    function envOnSearch(q) {
        envQuery = q.trim().toLowerCase();
        envRender();
    }

    function envRender() {
        var q = envQuery;

        var langs = envAllLangs.filter(function(l) {
            return !q || l.name.toLowerCase().indexOf(q) !== -1;
        });
        var apps  = envAllApps.filter(function(a) {
            return !q || a.name.toLowerCase().indexOf(q) !== -1;
        });

        var showLang = envFilter === 'all' || envFilter === 'lang';
        var showApps = envFilter === 'all' || envFilter === 'apps';

        var langSec = document.getElementById('env-lang-section');
        var appsSec = document.getElementById('env-apps-section');
        langSec.style.display = showLang ? '' : 'none';
        appsSec.style.display = showApps ? '' : 'none';

        if (showLang) {
            document.getElementById('env-lang-count').textContent = '(' + langs.length + ')';
            var langGrid  = document.getElementById('env-lang-grid');
            var langEmpty = document.getElementById('env-lang-empty');
            if (langs.length === 0) {
                langGrid.innerHTML = '';
                langEmpty.classList.remove('hidden');
            } else {
                langEmpty.classList.add('hidden');
                langGrid.innerHTML = langs.map(envLangCard).join('');
            }
        }

        if (showApps) {
            document.getElementById('env-apps-count').textContent = '(' + apps.length + ')';
            var appsGrid  = document.getElementById('env-apps-grid');
            var appsEmpty = document.getElementById('env-apps-empty');
            if (apps.length === 0) {
                appsGrid.innerHTML = '';
                appsEmpty.classList.remove('hidden');
            } else {
                appsEmpty.classList.add('hidden');
                appsGrid.innerHTML = apps.map(envAppCard).join('');
            }
        }

        var total = (showLang ? langs.length : 0) + (showApps ? apps.length : 0);
        document.getElementById('env-total-count').textContent = total + ' items';

        document.getElementById('env-loading').style.display = 'none';
        document.getElementById('env-content').style.display = '';
    }

    function envLangCard(lang) {
        var s = ENV_LANG_STYLE[lang.id] || { bg: '#1a2a1e', fg: '#4edea3', label: lang.id.toUpperCase().slice(0,3) };
        var badge = '<div class="env-lang-badge" style="background:' + s.bg + ';color:' + s.fg + ';">'
                  + envEsc(s.label) + '</div>';
        return '<div class="env-card env-lang-card" style="border-color:' + s.fg + '18;" title="' + envEscAttr(lang.name) + '">'
             + badge
             + '<span class="env-card-name">' + envEsc(lang.name) + '</span>'
             + '<span class="env-card-ver">'  + envEsc(lang.version || '') + '</span>'
             + '</div>';
    }

    function envAppCard(app) {
        var icon;
        if (app.iconUrl) {
            icon = '<img class="env-app-icon" src="' + app.iconUrl + '" alt="" onerror="envIconError(this)">';
        } else {
            icon = envIconPh();
        }
        return '<div class="env-card env-app-card" title="' + envEscAttr(app.name) + '">'
             + icon
             + '<span class="env-card-name">' + envEsc(app.name) + '</span>'
             + '</div>';
    }

    function envIconError(img) {
        var ph = document.createElement('div');
        ph.className = 'env-app-icon-ph';
        ph.innerHTML = envIconSvg();
        img.parentNode.replaceChild(ph, img);
    }
    function envIconPh()  { return '<div class="env-app-icon-ph">' + envIconSvg() + '</div>'; }
    function envIconSvg() {
        return '<svg viewBox="0 0 24 24" fill="#4edea3" width="28" height="28" opacity="0.4">'
             + '<path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-16v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>'
             + '</svg>';
    }

    function envEsc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function envEscAttr(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
